name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: cd aetheria && npm ci || npm install
      
      - name: Lint JavaScript
        run: cd aetheria && npm run lint || echo "Linting skipped"
      
      - name: Lint CSS
        run: cd aetheria && npm run lint:css || echo "CSS linting skipped"
      
      - name: Build assets
        run: cd aetheria && npm run build || echo "Build skipped"
      
      - name: Check performance budgets
        run: cd aetheria && npm run perf-budget || echo "Performance check skipped"
